name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & test (${{ matrix.os }})
    # Proves the toolkit builds, lints and passes tests on BOTH Windows and Linux.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (with dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest -q

  gui-smoke:
    name: GUI smoke test (offscreen)
    # Builds the PySide6 GUI and drives it headlessly against the simulator.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install package (with GUI + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,dev]"

      - name: Run offscreen GUI smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q tests/test_gui_smoke.py

  cpp-build:
    name: C++ build & test (${{ matrix.os }})
    # Builds the C++/CMake protocol core with MSVC on Windows and GCC on Linux.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cpp/build --config Release

      - name: Test (CTest)
        run: ctest --test-dir cpp/build -C Release --output-on-failure

  ros2-build:
    name: ROS 2 bridge build (Humble)
    # Builds the ament_python bridge package inside the official ROS 2 image and
    # smoke-imports the nodes. ROS 2 is Linux-only by design.
    runs-on: ubuntu-latest
    container: ros:humble
    timeout-minutes: 25
    steps:
      - name: Install git (for checkout)
        run: apt-get update && apt-get install -y git

      - uses: actions/checkout@v4

      - name: Install build tools
        run: apt-get install -y python3-colcon-common-extensions python3-pip

      - name: Install toolkit (for runtime imports)
        run: pip3 install -e .

      - name: colcon build
        shell: bash
        run: |
          . /opt/ros/humble/setup.sh
          mkdir -p ws/src
          cp -r ros2_bridge ws/src/fae_ros2_bridge
          cd ws
          colcon build --packages-select fae_ros2_bridge

      - name: Node import smoke test
        shell: bash
        run: |
          . /opt/ros/humble/setup.sh
          . ws/install/setup.sh
          python3 -c "import fae_ros2_bridge.bms_publisher, fae_ros2_bridge.io_publisher; print('import OK')"

  package:
    name: Package executable (${{ matrix.os }})
    # Continuous Delivery: on a version tag, build standalone executables for
    # both OSes and attach them to a GitHub Release. No Python needed by users.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: fae-toolkit-linux
          - os: windows-latest
            asset: fae-toolkit-windows.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (with GUI + build tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,build]"

      - name: Build standalone CLI executable
        run: pyinstaller --noconfirm --onefile --name fae-toolkit --paths src packaging/cli_entry.py

      - name: Rename artifact
        shell: bash
        run: |
          if [ -f dist/fae-toolkit.exe ]; then mv dist/fae-toolkit.exe "dist/${{ matrix.asset }}";
          else mv dist/fae-toolkit "dist/${{ matrix.asset }}"; fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
