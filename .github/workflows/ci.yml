name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & test (${{ matrix.os }})
    # Proves the toolkit builds, lints and passes tests on BOTH Windows and Linux.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (with dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest -q

  package:
    name: Package executable (${{ matrix.os }})
    # Continuous Delivery: on a version tag, build standalone executables for
    # both OSes and attach them to a GitHub Release. No Python needed by users.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: fae-toolkit-linux
          - os: windows-latest
            asset: fae-toolkit-windows.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (with GUI + build tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,build]"

      - name: Build standalone CLI executable
        run: pyinstaller --noconfirm --onefile --name fae-toolkit --paths src packaging/cli_entry.py

      - name: Rename artifact
        shell: bash
        run: |
          if [ -f dist/fae-toolkit.exe ]; then mv dist/fae-toolkit.exe "dist/${{ matrix.asset }}";
          else mv dist/fae-toolkit "dist/${{ matrix.asset }}"; fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
